appId: com.interview-prep.app
productName: 面试准备工具
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron-dist/**/*
extraMetadata:
  main: electron-dist/main.js
win:
  target:
    - nsis
  icon: public/favicon.svg
mac:
  target:
    - dmg
  icon: public/favicon.svg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - zh_CN
  language: 2052
